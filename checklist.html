            text-align: left; font-size: 0.7rem; color: #b85a4b; text-transform: uppercase;

        .checkbox-wrapper { display: inline-flex; align-items: center; cursor: pointer; }
        .checkbox-wrapper input[type="checkbox"] {
            appearance: none; -webkit-appearance: none;
            width: 17px; height: 17px; border: 1px solid #1a1a1a; border-radius: 3px;
            margin-right: 10px; display: inline-grid; place-content: center;
            background: #f6f3eb; transition: all 0.2s ease; cursor: pointer;
        }
        .checkbox-wrapper input[type="checkbox"]::before {
            content: ""; width: 9px; height: 9px; transform: scale(0);
            background-color: #f6f3eb; border-radius: 1px; transition: transform 0.2s ease;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .checkbox-wrapper input[type="checkbox"]:checked { background: #b85a4b; border-color: #b85a4b; }

        .checkbox-wrapper input[type="checkbox"]:checked + .task-title {

        }

        /* ==========================================================================
           【交互与数据状态持久化引擎】
           ========================================================================== */
        const root = document.getElementById('checklistRoot');

        // 初始化渲染
        function renderChecklist() {
            let html = "";
            dataset.forEach(proj => {
                html += `
                    <section class="project-section">
                        <div class="project-meta-head">
                            <h2>${proj.projectName}</h2>
                            <span class="page-url">Target: ${proj.pageUrl}</span>
                        </div>
                        <table class="task-table">
                            <thead>
                                <tr>
                                    <th style="width: 32%;">Asset Name</th>
                                    <th style="width: 25%;">Filename / Path</th>
                                    <th style="width: 18%;">AI Artboard Size</th>
                                    <th style="width: 25%;">Visual Specification</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                proj.tasks.forEach(task => {
                    const isChecked = localStorage.getItem(task.id) === 'true' ? 'checked' : '';
                    html += `
                        <tr>
                            <td>
                                <label class="checkbox-wrapper">
                                    <input type="checkbox" id="${task.id}" ${isChecked} onchange="toggleTask('${task.id}')">
                                    <span class="task-title">${task.title}</span>
                                </label>
                            </td>
                            <td><code class="filename-code">${task.file}</code></td>
                            <td><span class="size-badge">${task.size}</span></td>
                            <td><span class="task-desc">${task.desc}</span></td>
                        </tr>
                    `;
                });

                html += `
                            </tbody>
                        </table>
                    </section>
                `;
            });
            root.innerHTML = html;
            updateProgress();
        }

        // 状态切换与自动保存
        window.toggleTask = function(id) {
            const checkbox = document.getElementById(id);
            localStorage.setItem(id, checkbox.checked);
            updateProgress();
        };

        // 动态计算核心进度百分比
        function updateProgress() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const checkedboxes = document.querySelectorAll('input[type="checkbox"]:checked');
            
            const total = checkboxes.length;
            const completed = checkedboxes.length;
            const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;

            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressText').innerText = `${completed} / ${total} (${percentage}%)`;
        }

        // 启动引擎
        renderChecklist();
    </script>
